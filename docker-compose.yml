services:
  vibe-trading:
    build: .
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
    restart: always
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibe-trading-router.rule=Host(`vibe.thesolution.at`)"
      - "traefik.http.routers.vibe-trading-router.tls=true"
      - "traefik.http.services.vibe-trading-router.loadbalancer.server.port=8899"

volumes:
  vibe-runs:
  vibe-sessions:

networks:
  tradehub-network:
    external: true
