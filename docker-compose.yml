services:
  vibe-trading:
    build: .
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
    restart: always
    networks:
      - tradehub-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vibe-trading.rule=Host(`vibe.thesolution.at`)"
      - "traefik.http.routers.vibe-trading.entrypoints=websecure"
      - "traefik.http.routers.vibe-trading.tls=true"
      - "traefik.http.routers.vibe-trading.middlewares=vibe-auth"
      - "traefik.http.middlewares.vibe-auth.basicauth.users=owner:$apr1$y.Usukd9$mCpYYvB1OBHCfULMnn0/f."
      - "traefik.http.services.vibe-trading.loadbalancer.server.port=8899"

volumes:
  vibe-runs:
  vibe-sessions:

networks:
  tradehub-network:
    external: true
