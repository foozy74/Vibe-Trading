services:
  vibe-trading:
    build: .
    ports:
      - "8899:8899"
    env_file:
      - agent/.env
    volumes:
      - vibe-runs:/app/agent/runs
      - vibe-sessions:/app/agent/sessions
    restart: always
    networks:
      - tradehub-network

volumes:
  vibe-runs:
  vibe-sessions:

networks:
  tradehub-network:
    external: true
    name: tradehub-shared
